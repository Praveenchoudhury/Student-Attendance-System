<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}Student Information & Attendance System{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
<script>
  (function () {
    try {
      var saved = localStorage.getItem('sias_theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  })();
</script>
</head>
<body>
<button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
  <span class="icon-moon">&#9790;</span>
  <span class="icon-sun">&#9728;</span>
</button>
{% block body %}{% endblock %}
<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        try { localStorage.setItem('sias_theme', 'light'); } catch (e) {}
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        try { localStorage.setItem('sias_theme', 'dark'); } catch (e) {}
      }
    });
  })();
</script>
</body>
</html>
